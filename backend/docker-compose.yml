services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech
      POSTGRES_DB: fintech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d fintech"]
      interval: 5s
      timeout: 5s
      retries: 8

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://fintech:fintech@db:5432/fintech?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string_at_least_32_chars}
      PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

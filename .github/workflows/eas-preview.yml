name: EAS Preview (Android + optional iOS)

on:
  push:
    branches:
      - main
    paths:
      - 'App.tsx'
      - 'index.ts'
      - 'app.json'
      - 'eas.json'
      - 'package.json'
      - 'package-lock.json'
      - '.easignore'
      - 'assets/**'
      - 'src/**'
      - 'babel.config.js'
      - 'tsconfig.json'
      - '.github/workflows/eas-preview.yml'
  workflow_dispatch:
    inputs:
      include_ios:
        description: Queue iOS preview build (needs Apple credentials on Expo; run eas build --platform ios locally once first)
        type: boolean
        default: false

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: eas build — preview
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Non-interactive eas build requires a linked EAS project. Prefer committing
      # expo.extra.eas.projectId in app.json (eas init locally). Alternatively set
      # EAS_PROJECT_ID in the same GitHub Environment as EXPO_TOKEN (e.g. production).
      - name: Link EAS project if needed
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: |
          if node -e "const p=require('./app.json').expo?.extra?.eas?.projectId; process.exit(p?0:1)"; then
            echo "EAS projectId already present in app.json"
          elif [ -n "$EAS_PROJECT_ID" ]; then
            eas init --id "$EAS_PROJECT_ID" --non-interactive --force
          else
            echo "::error::EAS project not configured. Run eas login && eas init locally and commit app.json, or add repository/environment secret EAS_PROJECT_ID (Expo project UUID from expo.dev)."
            exit 1
          fi

      # Internal iOS builds need signing assets on Expo. Non-interactive CI cannot
      # create them; run once locally: eas build --profile preview --platform ios
      # (or configure credentials on expo.dev). Until then, only Android is queued on push.
      - name: Queue preview Android (APK)
        run: eas build --profile preview --platform android --non-interactive --no-wait

      - name: Queue preview iOS
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.include_ios == 'true'
        run: eas build --profile preview --platform ios --non-interactive --no-wait
